<!DOCTYPE html>
<html>
<head>
    <title>Clinic System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="bg-dark text-white p-3" style="width:250px; height:100vh;">
        <h4>🏥 Clinic</h4>
        <hr>

        <a href="/" class="text-white d-block mb-2">Dashboard</a>
        <a href="/patients/" class="text-white d-block mb-2">Patients</a>
        <a href="/appointments/" class="text-white d-block mb-2">Appointments</a>
        <a href="/bills/" class="text-white d-block mb-2">Billing</a>
        <a href="/logout/" class="text-white d-block mt-4">Logout</a>
    </div>

    <!-- Content -->
    <div class="p-4 w-100 bg-light">
        {% block content %}
        {% endblock %}
    </div>

</div>

</body>
</html>
