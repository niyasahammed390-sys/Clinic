<h2>Add Appointment</h2>

<form method="POST">
{% csrf_token %}

<select name="patient" required>
{% for p in patients %}
<option value="{{ p.id }}">{{ p.name }}</option>
{% endfor %}
</select><br><br>

<input type="date" name="date" required><br><br>

<input type="time" name="time" required><br><br>

<button>Save</button>
</form>
{% if error %}
<p style="color:red">{{ error }}</p>
{% endif %}
