{% extends 'base.html' %}
{% block content %}

<h2>Add Prescription</h2>

<form method="POST">
{% csrf_token %}

<select name="patient" class="form-control mb-2">
{% for p in patients %}
<option value="{{ p.id }}">{{ p.name }}</option>
{% endfor %}
</select>

<input name="doctor" placeholder="Doctor Name" class="form-control mb-2">

<textarea name="medicine" placeholder="Medicine" class="form-control mb-2"></textarea>

<textarea name="notes" placeholder="Notes" class="form-control mb-2"></textarea>

<button class="btn btn-primary">Save</button>
</form>

{% endblock %}
