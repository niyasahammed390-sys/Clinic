{% extends 'base.html' %}

{% block content %}
<h2>Dashboard</h2>

<div class="row">

<div class="col-md-3">
<div class="card p-3 shadow">
<h5>Total Patients</h5>
<h3>{{ patients }}</h3>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 shadow">
<h5>Appointments</h5>
<h3>{{ appointments }}</h3>
</div>
</div>

<div class="col-md-3">
<div class="card p-3 shadow">
<h5>Revenue</h5>
<h3>₹ {{ revenue }}</h3>
</div>
</div>

</div>
{% endblock %}
